<!DOCTYPE html>
<html>
<head>
<title>Global Weather App</title>

<style>
body{
font-family: Arial;
background: linear-gradient(to right,#36d1dc,#5b86e5);
color:white;
text-align:center;
padding-top:80px;
}

input{
padding:12px;
font-size:16px;
border-radius:6px;
border:none;
}

button{
padding:12px 20px;
font-size:16px;
border:none;
border-radius:6px;
background:black;
color:white;
cursor:pointer;
margin:5px;
}

.weather-box{
margin-top:30px;
font-size:20px;
}
</style>

</head>

<body>

<h1>🌍 Global Weather</h1>

<input id="city" placeholder="Enter city name">
<button onclick="getWeather()">Search</button>

<br><br>

<button onclick="getLocationWeather()">📍 Use My Location</button>

<div class="weather-box" id="weather"></div>

<script>

let apiKey="a213da6ce1c3cc3c01230b6fcb5e6882";

async function getWeather(){

let city=document.getElementById("city").value;

let url=`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`;

let response=await fetch(url);

let data=await response.json();

displayWeather(data);

}

function getLocationWeather(){

navigator.geolocation.getCurrentPosition(async position=>{

let lat=position.coords.latitude;

let lon=position.coords.longitude;

let url=`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${apiKey}&units=metric`;

let response=await fetch(url);

let data=await response.json();

displayWeather(data);

});

}

function displayWeather(data){

document.getElementById("weather").innerHTML=`

<h2>${data.name}</h2>

<p>🌡 Temperature: ${data.main.temp} °C</p>

<p>☁ Weather: ${data.weather[0].description}</p>

<p>💧 Humidity: ${data.main.humidity}%</p>

<p>💨 Wind Speed: ${data.wind.speed} m/s</p>

`;

}

</script>

</body>
</html>
