<!DOCTYPE html>
<html>
<head>

<title>Global Weather App</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#6a11cb,#2575fc);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
width:320px;
padding:25px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

input{
width:80%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
margin-top:10px;
padding:10px 15px;
border:none;
border-radius:8px;
background:#2575fc;
color:white;
cursor:pointer;
}

.weather{
margin-top:20px;
color:#333;
}

.forecast{
margin-top:20px;
font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<h2>đźŚ¤ Weather</h2>

<input id="city" placeholder="Enter city">

<br>

<button onclick="getWeather()">Search</button>

<button onclick="getLocationWeather()">đź“Ť My Location</button>

<div class="weather" id="weather"></div>

<div class="forecast" id="forecast"></div>

</div>

<script>

let apiKey="a213da6ce1c3cc3c01230b6fcb5e6882";

async function getWeather(){

let city=document.getElementById("city").value;

let url=`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`;

let response=await fetch(url);

let data=await response.json();

displayWeather(data);

getForecast(city);

}

function getLocationWeather(){

navigator.geolocation.getCurrentPosition(async position=>{

let lat=position.coords.latitude;

let lon=position.coords.longitude;

let url=`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${apiKey}&units=metric`;

let response=await fetch(url);

let data=await response.json();

displayWeather(data);

getForecast(data.name);

});

}

function displayWeather(data){

let icon=`https://openweathermap.org/img/wn/${data.weather[0].icon}@2x.png`;

document.getElementById("weather").innerHTML=`

<h3>${data.name}</h3>

<img src="${icon}">

<p>đźŚˇ ${data.main.temp} Â°C</p>

<p>${data.weather[0].description}</p>

<p>đź’§ Humidity: ${data.main.humidity}%</p>

`;

}

async function getForecast(city){

let url=`https://api.openweathermap.org/data/2.5/forecast?q=${city}&appid=${apiKey}&units=metric`;

let response=await fetch(url);

let data=await response.json();

let forecastHTML="";

for(let i=0;i<5;i++){

let item=data.list[i];

forecastHTML+=`<p>${item.main.temp}Â°C - ${item.weather[0].description}</p>`;

}

document.getElementById("forecast").innerHTML=forecastHTML;

}

</script>

</body>

</html>
